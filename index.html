<!DOCTYPE html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Gold Dashboard</title>
<style>
body{margin:0;background:#0b0b0b;font-family:Arial;color:#fff}
.box{max-width:1100px;margin:20px auto;padding:25px;background:#151515;border:2px solid #d4af37;border-radius:14px;box-shadow:0 0 20px rgba(212,175,55,.35);display:flex;flex-direction:column;align-items:center}
h1{color:#d4af37;text-align:center}h2{text-align:center}
table{width:100%;border-collapse:collapse;margin:18px 0}
th,td{text-align:center;padding:12px;border-bottom:1px solid #333;vertical-align:middle}table{table-layout:fixed} th:first-child,td:first-child{width:65%} th:last-child,td:last-child{width:35%}
th{background:#d4af37;color:#000}.green{color:#00ff88}.red{color:#ff6666}
#last{text-align:center;color:#d4af37;margin-top:12px}
</style></head><body>
<div class="box">
<h1>FOURKAYGOLD DASHBOARD</h1>
<div style="width:100%;max-width:900px;border:2px solid #d4af37;border-radius:12px;padding:18px;background:#101010;margin:0 auto 25px;">
<h2>LIVE LOMBONG PRICE (WE BUY)</h2>
<table style='width:100%;max-width:900px;margin:15px auto;'><thead><tr><th>Product</th><th>Sell Price</th></tr></thead><tbody id="mks"></tbody></table></div>

<div style="width:100%;max-width:900px;border:2px solid #d4af37;border-radius:12px;padding:18px;background:#101010;margin:0 auto 25px;">
<h2>Live Buyback Fourkay</h2>
<table style='width:100%;max-width:900px;margin:15px auto;'><thead><tr><th>Purity</th><th>Buyback</th></tr></thead><tbody id="tb"></tbody></table>
</div>
<div class="tradingview-widget-container" style="width:100%;max-width:900px;margin:0 auto;"><div id="tv_chart"></div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
new TradingView.widget({autosize:true,symbol:"OANDA:XAUUSD",interval:"15",timezone:"Asia/Kuala_Lumpur",theme:"dark",style:"1",locale:"en",container_id:"tv_chart"});
</script></div>
<div id="last"></div></div>
<script>
const rates=[["999(Jewelry)",1],["999.9",1.01],["916 / 22K",.916],["965",.965],["950",.95],["850",.85],["835",.835],["750 / 18K",.75],["700",.7],["585",.585],["375",.375]];
const bars=[["Gold : 1 Kilo 999.9"],["Gold : 100 GM 999.9"],["Gold : 50 GM 999.9"],["Gold : 1 Tael 999.9"],["Scrap Gold Fine Weight 1KG"],["Silver : 1 Gram 999"],["Gold OZ"],["Silver OZ"],["USD/MYR"]];
let base=540,prev={},prevM={};
function draw(){
let p=base+Math.sin(Date.now()/60000)*2;
let h="";
for(const [n] of bars){
 let price=0;
 if(n==="Gold : 1 Kilo 999.9") price=p*0.99*0.985;
 else if(n==="Gold : 100 GM 999.9") price=p*0.99*0.985;
 else if(n==="Gold : 50 GM 999.9") price=p*50;
 else if(n==="Gold : 1 Tael 999.9") price=p*37.429;
 else if(n==="Scrap Gold Fine Weight 1KG") price=p*998;
 else if(n==="Gold OZ") price=p*31.1035;
 else if(n==="Silver : 1 Gram 999") price=7.68;
 else if(n==="Silver OZ") price=61.65;
 else if(n==="USD/MYR") price=4.0685;
 let c="green"; if(prevM[n]!=null&&price<prevM[n]) c="red"; prevM[n]=price;
 let disp=(n==="USD/MYR")?price.toFixed(4):(price>=1000?price.toLocaleString('en-MY',{maximumFractionDigits:0}):price.toFixed(2));
 let prefix=(n==="USD/MYR")?"":"RM ";
 h+=`<tr><td>${n}</td><td class="${c}">${prefix}${disp}</td></tr>`;
}
mks.innerHTML=h;
let b="";
for(const [n,m] of rates){let v=p*m*.97,c="green";if(prev[n]!=null&&v<prev[n])c="red";prev[n]=v;b+=`<tr><td>${n}</td><td class="${c}">RM ${v.toFixed(2)}</td></tr>`;}
tb.innerHTML=b;
last.textContent="🕒 Last Update : "+new Date().toLocaleString("en-MY",{timeZone:"Asia/Kuala_Lumpur",hour12:false})+" MYT";
}
draw();setInterval(draw,3000);
</script></body></html>
